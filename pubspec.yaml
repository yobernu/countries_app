name: countries_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

# This environment block is REQUIRED to tell Flutter which Dart version to use
environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get_it: ^9.2.1
  
  # Upgraded networking stack
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^3.2.2 

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.4
  go_router: ^14.6.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

# This must be at the root level (no indentation)
flutter:
  uses-material-design: true

